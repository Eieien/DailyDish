# PowerSync sync rules for DailyDish.
#
# This is the source of truth committed to the repo; paste/deploy it via the
# PowerSync Cloud dashboard's Sync Rules editor (Connect > Sync Rules), or via
# the PowerSync CLI if using Git-based deploys.
#
# Scope: only "user", "recipes", and "meal" are replicated. "sessions" and
# "chat_messages" stay server-only (chat requires a live connection anyway).
bucket_definitions:
  user_data:
    parameters: SELECT request.user_id() as user_id
    data:
      - SELECT * FROM "user" WHERE id = bucket.user_id
      - SELECT * FROM recipes WHERE user_id = bucket.user_id
      - SELECT * FROM meal WHERE user_id = bucket.user_id
