# PowerSync Sync Streams config for DailyDish.
#
# Supersedes the old sync-rules.yaml (bucket_definitions), which was written
# for PowerSync's legacy "Sync Rules" mechanism and — it turns out — was
# never actually deployed, which was the root cause of PowerSync never
# connecting on any platform (server error: PSYNC_S2302 "No sync config
# available"). PowerSync's dashboard now presents Sync Streams as the
# current mechanism; Sync Rules still exist but are legacy.
#
# Paste this into the PowerSync Cloud dashboard's Sync Streams editor and
# deploy. `auto_subscribe: true` on every stream makes this behave the same
# as the old sync-everything-on-connect model — no client code changes
# needed; the existing useQuery() calls against local SQLite just start
# receiving data once this is deployed.
#
# Scope unchanged: only "user", "recipes", and "meal" replicate. "sessions"
# and "chat_messages" stay server-only (chat already requires a live
# connection anyway, and now reads/writes via REST or local context directly
# — see app/lib/aiContext.ts).
config:
  edition: 3

streams:
  user_profile:
    auto_subscribe: true
    query: SELECT * FROM "user" WHERE id = auth.user_id()

  user_recipes:
    auto_subscribe: true
    query: SELECT * FROM recipes WHERE user_id = auth.user_id()

  user_meals:
    auto_subscribe: true
    query: SELECT * FROM meal WHERE user_id = auth.user_id()
